<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Michael</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap');

    :root {
      --gray: #c0c0c0;
      --light: #ffffff;
      --mid: #dfdfdf;
      --dark: #808080;
      --black: #000000;
      --blue: #000080;
      --blue-light: #1084d0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--gray);
      font-family: "Pixelify Sans", "MS Sans Serif", Tahoma, Geneva, sans-serif;
      color: #000;
      overflow: hidden;
    }

    body {
      padding: 14px;
    }

    .contact-panel {
      display: grid;
      gap: 14px;
      width: 100%;
      height: 100%;
      background: var(--gray);
    }

    .intro {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px;
      background: var(--mid);
      border: 2px solid;
      border-color: var(--dark) var(--light) var(--light) var(--dark);
    }

    .penguin {
      width: 74px;
      height: 74px;
      object-fit: contain;
      object-position: center;
      display: block;
      image-rendering: pixelated;
    }

    h1 {
      margin-bottom: 6px;
      font-family: "Press Start 2P", "Pixelify Sans", monospace;
      font-size: clamp(.95rem, 3vw, 1.25rem);
      font-weight: 400;
      line-height: 1.35;
    }

    p {
      font-size: .95rem;
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      font-weight: 700;
      font-size: .92rem;
    }

    input,
    textarea {
      width: 100%;
      padding: 9px;
      background: white;
      color: black;
      border: 2px solid;
      border-color: var(--dark) var(--light) var(--light) var(--dark);
      font: inherit;
      font-size: .95rem;
      outline: none;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: 1px dotted #000;
      outline-offset: -5px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    button[type="submit"] {
      padding: 8px 13px;
      background: var(--gray);
      color: #000;
      border: 2px solid;
      border-color: var(--light) var(--black) var(--black) var(--light);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button[type="submit"]:active {
      border-color: var(--black) var(--light) var(--light) var(--black);
      transform: translate(1px, 1px);
    }

    .note {
      color: #333;
      font-size: .82rem;
    }

    .hidden-field {
      position: absolute;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 520px) {
      html,
      body {
        overflow: auto;
      }

      body {
        padding: 10px;
      }

      .intro {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .penguin {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>
<body>
  <main class="contact-panel">
    <div class="intro">
      <img class="penguin" src="portfolio_images/penguin_logo.png" alt="" aria-hidden="true" />
      <div>
        <h1>Send Michael a Message</h1>
        <p>Leave your name, email, and a quick note. I will get back to you as soon as I can!</p>
      </div>
    </div>

    <form action="https://formspree.io/f/mpqnnepd" method="POST">
      <label>
        Name
        <input type="text" name="name" autocomplete="name" placeholder="Your name" required />
      </label>

      <label>
        Email
        <input type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
      </label>

      <label>
        Message
        <textarea name="message" placeholder="Type your message here!" required></textarea>
      </label>

      <input type="hidden" name="_subject" value="New message from Michael's portfolio" />
      <input class="hidden-field" type="text" name="_gotcha" tabindex="-1" autocomplete="off" />

      <div class="actions">
        <button type="submit">Send Message</button>
        <span class="note">Powered by caffeine</span>
      </div>
    </form>
  </main>
</body>
</html>
