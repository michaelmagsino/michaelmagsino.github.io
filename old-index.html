<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Michael Magsino's Projects</title>
  <style>
    :root {
      --bg: rgb(40, 40, 72);
      --card-bg: rgba(255, 255, 255, 0.09);
      --card-border: rgba(255, 255, 255, 0.22);
      --accent: #9c6bff;
      --accent-2: #5ac8fa;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 36px 20px 48px;
      background:
        radial-gradient(circle at 25% 18%, rgba(156, 107, 255, 0.34), transparent 28%),
        radial-gradient(circle at 78% 72%, rgba(90, 200, 250, 0.24), transparent 32%),
        linear-gradient(135deg, rgb(34, 34, 66), var(--bg));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .page-header {
      position: relative;
      z-index: 3;
      max-width: 820px;
      margin: 0 auto 22px;
    }

    h1 {
      font-size: clamp(2.7rem, 7vw, 5.4rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.06em;
      margin: 0;
      text-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 540px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .project-space {
      position: relative;
      width: min(1120px, 100%);
      height: 660px;
      margin: 0 auto;
      border-radius: 34px;
      overflow: hidden;
    }

    .project-space::before {
      content: "";
      position: absolute;
      inset: 28px;
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: 34px;
      pointer-events: none;
    }

    .glass-button {
      position: absolute;
      display: grid;
      place-items: center;
      width: clamp(178px, 22vw, 250px);
      min-height: 112px;
      padding: 22px 20px;
      color: white;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.045)),
        var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 34px 22px 38px 24px;
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      text-decoration: none;
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .glass-button::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .glass-button::after {
      content: "drag";
      position: absolute;
      top: 12px;
      right: 14px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.64rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .glass-button span {
      position: relative;
      z-index: 2;
      display: block;
      max-width: 190px;
      font-size: 1.08rem;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .glass-button:hover,
    .glass-button:focus-visible {
      background:
        linear-gradient(135deg, rgba(156, 107, 255, 0.32), rgba(90, 200, 250, 0.18)),
        var(--card-bg);
      border-color: rgba(255, 255, 255, 0.42);
      box-shadow:
        0 0 34px rgba(156, 107, 255, 0.34),
        0 26px 70px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      outline: none;
    }

    .glass-button.dragging {
      z-index: 20;
      cursor: grabbing;
      box-shadow:
        0 0 44px rgba(90, 200, 250, 0.35),
        0 34px 90px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .glass-button:nth-child(1) { left: 7%; top: 12%; transform: rotate(-5deg); }
    .glass-button:nth-child(2) { left: 38%; top: 7%; transform: rotate(3deg); border-radius: 26px 40px 24px 36px; }
    .glass-button:nth-child(3) { left: 68%; top: 17%; transform: rotate(-2deg); border-radius: 42px 24px 34px 22px; }
    .glass-button:nth-child(4) { left: 13%; top: 42%; transform: rotate(4deg); border-radius: 24px 36px 42px 26px; }
    .glass-button:nth-child(5) { left: 43%; top: 39%; transform: rotate(-4deg); }
    .glass-button:nth-child(6) { left: 67%; top: 49%; transform: rotate(5deg); border-radius: 38px 26px 22px 42px; }
    .glass-button:nth-child(7) { left: 34%; top: 68%; transform: rotate(2deg); border-radius: 24px 42px 30px 38px; }

    @media (max-width: 760px) {
      body {
        padding: 28px 14px 36px;
      }

      .project-space {
        height: auto;
        display: grid;
        gap: 18px;
        padding: 28px 0 10px;
        overflow: visible;
      }

      .project-space::before {
        display: none;
      }

      .glass-button,
      .glass-button:nth-child(n) {
        position: relative;
        left: auto;
        top: auto;
        width: min(92vw, 390px);
        min-height: 98px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>Michael Magsino</h1>
    <p class="subtitle">Choose a section, or drag the boxes around to rearrange the page.</p>
  </header>

  <main class="project-space" aria-label="Project links">
    <a href="dom.html" class="glass-button"><span>About Me</span></a>
    <a href="CT20.html" class="glass-button"><span>CT 20 Projects<br>(Winter Quarter 2025)</span></a>
    <a href="CT120.html" class="glass-button"><span>CT 120 Projects<br>(Spring Quarter 2025)</span></a>
    <a href="CTCourses.html" class="glass-button"><span>Additional CT Projects</span></a>
    <a href="CT100_Portfolio.html" class="glass-button"><span>CT 100 Portfolio</span></a>
    <a href="MichaelMagsino.html" class="glass-button"><span>Revitalized Portfolio</span></a>
    <a href="test.html" class="glass-button"><span>Test Portfolio</span></a>
  </main>

  <script>
    const projectSpace = document.querySelector('.project-space');
    const cards = document.querySelectorAll('.glass-button');
    let activeCard = null;
    let startX = 0;
    let startY = 0;
    let cardStartX = 0;
    let cardStartY = 0;
    let hasDragged = false;

    function getCardPosition(card) {
      const spaceRect = projectSpace.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      return {
        x: cardRect.left - spaceRect.left,
        y: cardRect.top - spaceRect.top
      };
    }

    cards.forEach((card) => {
      card.addEventListener('pointerdown', (event) => {
        if (window.matchMedia('(max-width: 760px)').matches) return;

        activeCard = card;
        hasDragged = false;
        const currentPosition = getCardPosition(card);
        startX = event.clientX;
        startY = event.clientY;
        cardStartX = currentPosition.x;
        cardStartY = currentPosition.y;

        card.classList.add('dragging');
        card.style.left = `${cardStartX}px`;
        card.style.top = `${cardStartY}px`;
        card.style.transform = 'rotate(0deg) scale(1.04)';
        card.setPointerCapture(event.pointerId);
      });

      card.addEventListener('pointermove', (event) => {
        if (!activeCard || activeCard !== card) return;

        const dx = event.clientX - startX;
        const dy = event.clientY - startY;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasDragged = true;

        const maxX = projectSpace.clientWidth - card.offsetWidth;
        const maxY = projectSpace.clientHeight - card.offsetHeight;
        const nextX = Math.min(Math.max(cardStartX + dx, 0), maxX);
        const nextY = Math.min(Math.max(cardStartY + dy, 0), maxY);

        card.style.left = `${nextX}px`;
        card.style.top = `${nextY}px`;
      });

      card.addEventListener('pointerup', (event) => {
        if (!activeCard || activeCard !== card) return;

        card.classList.remove('dragging');
        card.style.transform = 'rotate(0deg)';
        activeCard = null;

        if (hasDragged) {
          event.preventDefault();
          card.dataset.wasDragged = 'true';
        }
      });

      card.addEventListener('click', (event) => {
        if (card.dataset.wasDragged === 'true') {
          event.preventDefault();
          card.dataset.wasDragged = 'false';
        }
      });
    });
  </script>
</body>
</html>
