<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiraeth Navigation Overlay</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #05070a;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: min(100vw, 1873px);
      aspect-ratio: 1873 / 969;
      overflow: hidden;
      background: #111;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
    }

    .scene-image {
      position: absolute;
      inset: 0;
      background-image: url("hiraeth/Screenshot 2026-05-26 204500.png");
      background-size: cover;
      background-position: center;
      filter: brightness(0.95) contrast(1.03) saturate(0.9);
    }

    .target-hud {
      position: absolute;
      top: 4.5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: hudFloat 3.8s ease-in-out infinite;
    }

    .target-hud::before {
      content: "";
      width: 64px;
      height: 1px;
      margin-bottom: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(170, 245, 255, 0.85),
        transparent
      );
      box-shadow: 0 0 10px rgba(110, 225, 255, 0.42);
      opacity: 0.8;
    }

    .target-name {
      padding: 8px 18px 7px;
      border-radius: 999px;
      border: 1px solid rgba(155, 238, 255, 0.28);
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(195, 246, 255, 0.07) 0 1px,
          transparent 1px 6px
        ),
        radial-gradient(
          ellipse at center,
          rgba(70, 180, 255, 0.18),
          rgba(10, 35, 70, 0.24) 68%,
          transparent 100%
        );
      box-shadow:
        0 0 16px rgba(95, 205, 255, 0.16),
        inset 0 0 16px rgba(145, 235, 255, 0.06);
      backdrop-filter: blur(4px);
      color: rgba(225, 252, 255, 0.94);
      font-size: clamp(0.8rem, 1.1vw, 1rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(135, 235, 255, 0.52),
        0 0 18px rgba(70, 170, 255, 0.24);
    }

    .target-distance {
      color: rgba(190, 245, 255, 0.88);
      font-size: clamp(0.8rem, 1vw, 0.95rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(125, 230, 255, 0.4),
        0 0 14px rgba(70, 170, 255, 0.2);
      opacity: 0.95;
    }

    .target-distance::before,
    .target-distance::after {
      content: "·";
      margin: 0 8px;
      color: rgba(165, 238, 255, 0.5);
    }


    .route-link-panel {
      position: absolute;
      right: 3.2%;
      bottom: 4.2%;
      z-index: 24;
      pointer-events: none;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 7px 12px 8px;
      border-radius: 999px;
      border: 1px solid rgba(150, 238, 255, 0.18);
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(195, 246, 255, 0.055) 0 1px,
          transparent 1px 5px
        ),
        linear-gradient(
          90deg,
          rgba(8, 28, 45, 0.12),
          rgba(80, 195, 255, 0.1),
          rgba(8, 28, 45, 0.12)
        );
      box-shadow:
        0 0 18px rgba(95, 205, 255, 0.12),
        inset 0 0 14px rgba(145, 235, 255, 0.05);
      backdrop-filter: blur(3px);
      opacity: 0.76;
      animation: routeLinkPanelPulse 3.1s ease-in-out infinite;
    }

    .route-pip {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(205, 250, 255, 0.92);
      box-shadow:
        0 0 8px rgba(190, 248, 255, 0.68),
        0 0 16px rgba(85, 205, 255, 0.3);
      animation: routePipPulse 1.6s ease-in-out infinite;
    }

    .route-text {
      color: rgba(200, 248, 255, 0.78);
      font-size: clamp(0.58rem, 0.72vw, 0.76rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(130, 230, 255, 0.34);
      white-space: nowrap;
    }

    .route-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 10px;
    }

    .route-bars span {
      width: 2px;
      border-radius: 999px;
      background: rgba(180, 245, 255, 0.62);
      box-shadow: 0 0 6px rgba(145, 235, 255, 0.38);
      animation: routeBarPulse 1.8s ease-in-out infinite;
    }

    .route-bars span:nth-child(1) {
      height: 3px;
      animation-delay: 0s;
    }

    .route-bars span:nth-child(2) {
      height: 6px;
      animation-delay: 0.16s;
    }

    .route-bars span:nth-child(3) {
      height: 9px;
      animation-delay: 0.32s;
    }

    .danger-label {
      position: absolute;
      top: 46%;
      left: 93.2%;
      transform:
        translate(-50%, -50%)
        rotate(2.1deg)
        skewX(-24deg);
      transform-origin: center;
      z-index: 25;
      pointer-events: none;
      display: inline-flex;
      align-items: center;
      gap: 0.45em;
      font-family: "Courier New", monospace;
      font-size: clamp(1.15rem, 1.85vw, 1.9rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 176, 132, 0.92);
      text-shadow:
        0 0 6px rgba(255, 185, 145, 0.35),
        0 0 14px rgba(255, 125, 82, 0.24),
        0 0 26px rgba(205, 70, 42, 0.14);
      opacity: 0.92;
      animation: dangerLabelPulse 3.6s ease-in-out infinite;
    }

    .danger-label::before,
    .danger-label::after {
      font-family: "Courier New", monospace;
      font-weight: 700;
      color: currentColor;
      opacity: 0.85;
      text-shadow: 0 0 8px currentColor;
    }

    .danger-label::before {
      content: "[";
      margin-right: -0.1em;
    }

    .danger-label::after {
      content: "]";
      margin-left: -0.1em;
    }

    .danger-label-text {
      position: relative;
      display: inline-block;
      line-height: 1;
    }

    .danger-label-text::before,
    .danger-label-text::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 14px;
      height: 1px;
      background: currentColor;
      opacity: 0.6;
      box-shadow: 0 0 8px currentColor;
      transform: translateY(-50%);
    }

    .danger-label-text::before {
      left: -18px;
    }

    .danger-label-text::after {
      right: -18px;
    }

    .overlay-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* NAVIGATION BEACONS */

    .nav-beacon-wash {
      fill: rgba(105, 225, 255, 0.045);
      stroke: rgba(160, 245, 255, 0.16);
      stroke-width: 1;
      filter:
        blur(12px)
        drop-shadow(0 0 24px rgba(85, 205, 255, 0.22));
      opacity: 0.65;
      animation: navBeaconBreath 3.4s ease-in-out infinite;
    }

    .nav-beacon-node {
      fill: rgba(205, 250, 255, 0.76);
      stroke: rgba(120, 230, 255, 0.88);
      stroke-width: 1.2;
      filter:
        drop-shadow(0 0 8px rgba(210, 250, 255, 0.64))
        drop-shadow(0 0 18px rgba(80, 195, 255, 0.36));
      transform-box: fill-box;
      transform-origin: center;
      animation: navNodePing 2.2s ease-in-out infinite;
    }

    .nav-beacon-ring {
      fill: none;
      stroke: rgba(135, 235, 255, 0.34);
      stroke-width: 1.4;
      filter: drop-shadow(0 0 10px rgba(90, 215, 255, 0.28));
      transform-box: fill-box;
      transform-origin: center;
      animation: navRingExpand 2.2s ease-out infinite;
    }

    .nav-chevron {
      fill: none;
      stroke: rgba(150, 240, 255, 0.72);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 7px rgba(165, 245, 255, 0.44))
        drop-shadow(0 0 15px rgba(70, 185, 255, 0.24));
      opacity: 0.78;
      transform-box: fill-box;
      transform-origin: center;
      animation: navChevronPulse 1.65s ease-in-out infinite;
    }

    .nav-beacon-1,
    .nav-chevron-1 { animation-delay: 0s; }
    .nav-beacon-2,
    .nav-chevron-2 { animation-delay: 0.26s; }
    .nav-beacon-3,
    .nav-chevron-3 { animation-delay: 0.52s; }
    .nav-beacon-4,
    .nav-chevron-4 { animation-delay: 0.78s; }

    /* SAFEHOUSE, blue overlay */

    .warehouse-mist {
      fill: rgba(180, 245, 255, 0.06);
      stroke: rgba(210, 252, 255, 0.16);
      stroke-width: 1;
      stroke-linejoin: round;
      filter: blur(28px) drop-shadow(0 0 54px rgba(115, 220, 255, 0.28));
      opacity: 0.7;
      transform-box: fill-box;
      transform-origin: center;
      animation: mistDrift 5.2s ease-in-out infinite;
    }

    .warehouse-halo {
      fill: rgba(125, 225, 255, 0.18);
      stroke: rgba(175, 245, 255, 0.18);
      stroke-width: 7;
      stroke-linejoin: round;
      filter:
        blur(16px)
        drop-shadow(0 0 18px rgba(145, 235, 255, 0.48))
        drop-shadow(0 0 42px rgba(90, 200, 255, 0.34))
        drop-shadow(0 0 76px rgba(50, 150, 255, 0.22));
      opacity: 0.82;
      transform-box: fill-box;
      transform-origin: center;
      animation: haloPulse 3.4s ease-in-out infinite;
    }

    .warehouse-highlight {
      fill: rgba(95, 210, 255, 0.11);
      stroke: rgba(165, 240, 255, 0.54);
      stroke-width: 2;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 7px rgba(130, 235, 255, 0.34))
        drop-shadow(0 0 22px rgba(80, 190, 255, 0.24))
        drop-shadow(0 0 38px rgba(55, 150, 255, 0.14));
      animation: warehousePulse 3.4s ease-in-out infinite;
    }

    .warehouse-highlight-inner {
      fill: rgba(185, 245, 255, 0.035);
      stroke: rgba(210, 250, 255, 0.2);
      stroke-width: 0.9;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 10px rgba(150, 235, 255, 0.18));
      animation: warehouseInnerPulse 3.4s ease-in-out infinite;
    }

    .warehouse-scanlines {
      fill: url(#scanPatternBlue);
      opacity: 0.075;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 8px rgba(165, 240, 255, 0.18));
      animation: scanFlicker 3s ease-in-out infinite;
    }

    /* DANGER, orange-red overlay */

    .danger-mist {
      fill: rgba(255, 180, 120, 0.07);
      stroke: rgba(255, 218, 185, 0.12);
      stroke-width: 1;
      stroke-linejoin: round;
      filter: blur(26px) drop-shadow(0 0 54px rgba(255, 120, 70, 0.28));
      opacity: 0.62;
      transform-box: fill-box;
      transform-origin: center;
      animation:
        dangerMistDrift 4.8s ease-in-out infinite,
        dangerGlitchShift 3.7s steps(1, end) infinite;
    }

    .danger-halo {
      fill: rgba(255, 136, 82, 0.16);
      stroke: rgba(255, 185, 145, 0.16);
      stroke-width: 7;
      stroke-linejoin: round;
      filter:
        blur(16px)
        drop-shadow(0 0 18px rgba(255, 160, 110, 0.42))
        drop-shadow(0 0 40px rgba(255, 104, 58, 0.3))
        drop-shadow(0 0 70px rgba(220, 70, 45, 0.22));
      opacity: 0.76;
      transform-box: fill-box;
      transform-origin: center;
      animation:
        dangerHaloPulse 2.6s ease-in-out infinite,
        dangerGlitchShift 3.7s steps(1, end) infinite;
    }

    .danger-highlight {
      fill: rgba(255, 118, 70, 0.1);
      stroke: rgba(255, 188, 145, 0.5);
      stroke-width: 2;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 7px rgba(255, 170, 120, 0.3))
        drop-shadow(0 0 22px rgba(255, 110, 70, 0.22))
        drop-shadow(0 0 36px rgba(205, 65, 35, 0.12));
      opacity: 0.96;
      transform-box: fill-box;
      transform-origin: center;
      animation:
        dangerPulse 2.6s ease-in-out infinite,
        dangerGlitchShift 3.7s steps(1, end) infinite,
        dangerOpacityGlitch 2.9s steps(1, end) infinite;
    }

    .danger-highlight-inner {
      fill: rgba(255, 220, 185, 0.03);
      stroke: rgba(255, 225, 205, 0.16);
      stroke-width: 0.9;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(255, 175, 130, 0.14));
      transform-box: fill-box;
      transform-origin: center;
      animation:
        dangerInnerPulse 2.6s ease-in-out infinite,
        dangerGlitchShiftFine 2.4s steps(1, end) infinite;
    }

    .danger-scanlines {
      fill: url(#scanPatternDanger);
      opacity: 0.07;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 8px rgba(255, 170, 120, 0.14));
      transform-box: fill-box;
      transform-origin: center;
      animation:
        dangerScanFlicker 2.2s ease-in-out infinite,
        dangerScanGlitch 1.65s steps(1, end) infinite;
    }

    .danger-glitch-slice {
      fill: rgba(255, 205, 165, 0.22);
      stroke: rgba(255, 125, 82, 0.52);
      stroke-width: 1.5;
      stroke-linejoin: round;
      filter:
        blur(0.6px)
        drop-shadow(0 0 14px rgba(255, 130, 82, 0.55))
        drop-shadow(0 0 28px rgba(190, 45, 30, 0.28));
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: dangerSliceGlitch 2.35s steps(1, end) infinite;
    }

    .danger-glitch-slice.alt {
      fill: rgba(180, 35, 28, 0.2);
      stroke: rgba(255, 80, 56, 0.45);
      animation-delay: 0.8s;
    }

    .danger-glitch-slice.alt-2 {
      fill: rgba(255, 230, 180, 0.16);
      stroke: rgba(255, 160, 90, 0.42);
      animation-delay: 1.55s;
    }

    @keyframes hudFloat {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
        opacity: 0.92;
      }

      50% {
        transform: translateX(-50%) translateY(2px);
        opacity: 1;
      }
    }


    @keyframes routeLinkPanelPulse {
      0%, 100% {
        opacity: 0.56;
        transform: translateY(0);
      }

      50% {
        opacity: 0.88;
        transform: translateY(-1px);
      }
    }

    @keyframes routePipPulse {
      0%, 100% {
        opacity: 0.42;
        transform: scale(0.85);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    @keyframes routeBarPulse {
      0%, 100% {
        opacity: 0.28;
      }

      50% {
        opacity: 0.92;
      }
    }

    @keyframes navBeaconBreath {
      0%, 100% {
        opacity: 0.38;
        transform: scale(0.985);
      }

      50% {
        opacity: 0.78;
        transform: scale(1.018);
      }
    }

    @keyframes navNodePing {
      0%, 100% {
        opacity: 0.38;
        transform: scale(0.82);
      }

      44% {
        opacity: 1;
        transform: scale(1.18);
      }

      70% {
        opacity: 0.62;
        transform: scale(0.96);
      }
    }

    @keyframes navRingExpand {
      0% {
        opacity: 0.62;
        transform: scale(0.65);
      }

      70% {
        opacity: 0.14;
        transform: scale(1.65);
      }

      100% {
        opacity: 0;
        transform: scale(1.9);
      }
    }

    @keyframes navChevronPulse {
      0%, 100% {
        opacity: 0.24;
        transform: translateY(4px) scale(0.92);
      }

      45% {
        opacity: 0.9;
        transform: translateY(-2px) scale(1.08);
      }

      70% {
        opacity: 0.46;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes dangerLabelPulse {
      0%, 100% {
        color: rgba(255, 180, 135, 0.92);
        text-shadow:
          0 0 6px rgba(255, 185, 145, 0.34),
          0 0 14px rgba(255, 125, 82, 0.22),
          0 0 24px rgba(205, 70, 42, 0.12);
        opacity: 0.92;
      }

      50% {
        color: rgba(145, 40, 34, 0.95);
        text-shadow:
          0 0 6px rgba(155, 45, 40, 0.28),
          0 0 14px rgba(120, 28, 28, 0.22),
          0 0 20px rgba(90, 18, 18, 0.14);
        opacity: 0.78;
      }
    }

    @keyframes haloPulse {
      0%, 100% {
        opacity: 0.46;
        transform: scale(0.985);
        filter:
          blur(14px)
          drop-shadow(0 0 14px rgba(145, 235, 255, 0.32))
          drop-shadow(0 0 34px rgba(90, 200, 255, 0.22))
          drop-shadow(0 0 64px rgba(50, 150, 255, 0.14));
      }

      50% {
        opacity: 0.92;
        transform: scale(1.018);
        filter:
          blur(18px)
          drop-shadow(0 0 24px rgba(180, 248, 255, 0.58))
          drop-shadow(0 0 56px rgba(105, 215, 255, 0.4))
          drop-shadow(0 0 90px rgba(60, 165, 255, 0.26));
      }
    }

    @keyframes warehousePulse {
      0%, 100% {
        fill: rgba(85, 205, 255, 0.075);
        stroke: rgba(145, 235, 255, 0.42);
        filter:
          drop-shadow(0 0 5px rgba(125, 230, 255, 0.22))
          drop-shadow(0 0 16px rgba(80, 190, 255, 0.14))
          drop-shadow(0 0 30px rgba(55, 150, 255, 0.08));
      }

      50% {
        fill: rgba(105, 220, 255, 0.16);
        stroke: rgba(205, 250, 255, 0.68);
        filter:
          drop-shadow(0 0 9px rgba(165, 245, 255, 0.42))
          drop-shadow(0 0 28px rgba(95, 210, 255, 0.26))
          drop-shadow(0 0 48px rgba(65, 170, 255, 0.16));
      }
    }

    @keyframes mistDrift {
      0%, 100% {
        opacity: 0.32;
        transform: scale(0.98) translateY(2px);
      }

      50% {
        opacity: 0.76;
        transform: scale(1.035) translateY(-3px);
      }
    }

    @keyframes warehouseInnerPulse {
      0%, 100% {
        opacity: 0.14;
      }

      50% {
        opacity: 0.34;
      }
    }

    @keyframes scanFlicker {
      0%, 100% {
        opacity: 0.045;
      }

      50% {
        opacity: 0.11;
      }
    }

    @keyframes dangerGlitchShift {
      0%, 58%, 66%, 100% {
        transform: translate(0, 0) scale(1);
      }

      59% {
        transform: translate(-14px, 5px) scale(1.012);
      }

      60% {
        transform: translate(12px, -4px) scale(0.992);
      }

      62% {
        transform: translate(-8px, 2px) scale(1.006);
      }

      64% {
        transform: translate(7px, -2px) scale(0.998);
      }
    }

    @keyframes dangerGlitchShiftFine {
      0%, 66%, 72%, 100% {
        transform: translate(0, 0);
      }

      67% {
        transform: translate(3px, -1px);
      }

      69% {
        transform: translate(-4px, 1px);
      }
    }

    @keyframes dangerOpacityGlitch {
      0%, 54%, 62%, 100% {
        opacity: 0.96;
      }

      55% {
        opacity: 0.16;
      }

      56% {
        opacity: 1;
      }

      58% {
        opacity: 0.34;
      }

      60% {
        opacity: 1;
      }
    }

    @keyframes dangerScanGlitch {
      0%, 48%, 58%, 100% {
        transform: translate(0, 0);
        opacity: 0.07;
      }

      49% {
        transform: translate(18px, 0);
        opacity: 0.28;
      }

      51% {
        transform: translate(-16px, 2px);
        opacity: 0.03;
      }

      54% {
        transform: translate(10px, -1px);
        opacity: 0.22;
      }
    }

    @keyframes dangerSliceGlitch {
      0%, 54%, 63%, 100% {
        opacity: 0;
        transform: translate(0, 0) scaleX(1);
      }

      55% {
        opacity: 0.92;
        transform: translate(-24px, 4px) scaleX(1.06);
      }

      57% {
        opacity: 0.48;
        transform: translate(20px, -3px) scaleX(0.98);
      }

      59% {
        opacity: 0.78;
        transform: translate(-12px, 2px) scaleX(1.03);
      }

      61% {
        opacity: 0.25;
        transform: translate(14px, -1px) scaleX(1.01);
      }
    }

    @keyframes dangerHaloPulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(0.988);
        filter:
          blur(14px)
          drop-shadow(0 0 12px rgba(255, 170, 120, 0.26))
          drop-shadow(0 0 30px rgba(255, 104, 58, 0.18))
          drop-shadow(0 0 54px rgba(220, 70, 45, 0.12));
      }

      50% {
        opacity: 0.84;
        transform: scale(1.02);
        filter:
          blur(18px)
          drop-shadow(0 0 22px rgba(255, 195, 155, 0.44))
          drop-shadow(0 0 48px rgba(255, 118, 70, 0.32))
          drop-shadow(0 0 82px rgba(220, 70, 45, 0.22));
      }
    }

    @keyframes dangerPulse {
      0%, 100% {
        fill: rgba(255, 120, 72, 0.07);
        stroke: rgba(255, 188, 145, 0.38);
        filter:
          drop-shadow(0 0 5px rgba(255, 175, 130, 0.18))
          drop-shadow(0 0 16px rgba(255, 110, 70, 0.12))
          drop-shadow(0 0 28px rgba(205, 65, 35, 0.08));
      }

      50% {
        fill: rgba(255, 132, 78, 0.16);
        stroke: rgba(255, 220, 190, 0.62);
        filter:
          drop-shadow(0 0 9px rgba(255, 205, 170, 0.34))
          drop-shadow(0 0 26px rgba(255, 125, 82, 0.22))
          drop-shadow(0 0 42px rgba(210, 70, 42, 0.14));
      }
    }

    @keyframes dangerMistDrift {
      0%, 100% {
        opacity: 0.28;
        transform: scale(0.985) translateY(2px);
      }

      50% {
        opacity: 0.66;
